<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <script src="https://cdn.tailwindcss.com"></script>

        <title>d3-heatmap2</title>
    </head>
    <body class="bg-zinc-50 min-h-screen">
        <main class="p-8 overflow-auto">
            <div class="max-w-5xl mx-auto">
                <header class="mb-6">
                    <h1 class="text-3xl font-semibold text-zinc-900">
                        d3-heatmap2
                    </h1>
                </header>
                <div class="space-y-6">
                    <div
                        class="rounded-lg border border-zinc-200 bg-white shadow-sm p-6"
                    >
                        <div id="chart"></div>
                    </div>
                    <div
                        class="rounded-lg border border-zinc-200 bg-white shadow-sm p-6 min-h-[80px]"
                    >
                        <div id="legend"></div>
                    </div>
                    <div
                        class="rounded-lg border border-zinc-200 bg-white shadow-sm p-6 min-h-[80px]"
                    >
                        <div id="details"></div>
                    </div>
                </div>
            </div>
        </main>

        <!-- D3.js -->
        <script src="https://d3js.org/d3.v7.js" charset="utf-8"></script>

        <!-- main -->
        <script type="module" src="main.js"></script>
    </body>
</html>
